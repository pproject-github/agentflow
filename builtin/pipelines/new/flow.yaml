instances:
  control_start_new:
    definitionId: control_start
    label: Start
    role: normal
    input: []
    output:
      - type: node
        name: next
        value: ""
    body: |
      流程入口
  agent_plan:
    definitionId: agent_subAgent
    label: Plan Nodes
    role: planning
    input:
      - type: node
        name: prev
        value: ""
      - type: file
        name: nodes.md
        value: ""
      - type: text
        name: message
        value: ""
      - type: file
        name: flow.yaml
        value: ""
    output:
      - type: node
        name: next
        value: ""
      - type: file
        name: plan.md
        value: ""
      - type: text
        name: newFlow
        value: ""
    body: |
      用户描述的Requirements为：${message}。结合现有节点信息 ${nodes.md}，及流程参考 ${flow.yaml}。Plan Nodes图并输出为 ${plan.md}，供用户先确认。
      新建的 flow 名称保存到 ${newFlow}。该名称须与 agentflow list 列出的已有 pipeline 不同（不可重复）。
      注意：内置节点的 instance 应保持和原始 node 元数据一致（尤其是 description）。
  agent_create:
    definitionId: agent_subAgent
    label: Create Flow
    role: normal
    input:
      - type: node
        name: prev
        value: ""
      - type: file
        name: plan.md
        value: ""
      - type: file
        name: layout.md
        value: ""
      - type: text
        name: newFlow
        value: ""
    output:
      - type: node
        name: next
        value: ""
      - type: file
        name: script.md
        value: ""
    body: |
      基于 ${plan.md} 在 ~/agentflow/pipelines/${newFlow}/ 下**必须生成并写入** flow.yaml（不存在则创建，已存在则按规划覆盖）：
      节点布局参考 ${layout.md}，避免节点排成一条线。
      若有脚本需实现，将脚本路径与功能说明写入 ${script.md}，供下游 agent 实现代码，本节点 **不** 书写代码。
  control_end_new:
    definitionId: control_end
    label: End
    role: normal
    input:
      - type: node
        name: prev
        value: ""
    output: []
    body: |
      新建流程的出口。
  provide_skills_file:
    definitionId: provide_file
    label: Layout Skills
    role: normal
    input: []
    output:
      - type: file
        name: value
        value: ~/agentflow/reference/flow-layout.md
    body: ""
  provide_requirement:
    definitionId: provide_str
    label: Requirements
    role: normal
    input: []
    output:
      - type: text
        name: value
        value: 将AI_Workspace中个daily流程（几个source和一个summary）改造成agentflow流程
    body: ""
  agent_fix:
    definitionId: agent_subAgent
    label: Fix Nodes
    role: planning
    input:
      - type: node
        name: prev
        value: ""
      - type: file
        name: err.md
        value: ""
      - type: file
        name: err2.md
        value: ""
    output:
      - type: node
        name: next
        value: ""
    body: |
      修复${err.md} 及 ${err2.md} 中提到的问题
  agent_implement_script:
    definitionId: agent_subAgent
    label: Complete Code
    role: code
    input:
      - type: node
        name: prev
        value: ""
      - type: file
        name: code.md
        value: ""
    output:
      - type: node
        name: next
        value: ""
    body: |
      实现 ${code.md} 中提到要写的代码。
  tool_user_check:
    definitionId: tool_user_check
    label: UserCheck
    role: normal
    input:
      - type: node
        name: prev
        value: ""
      - type: file
        name: check.md
        value: ""
    output:
      - type: node
        name: next
        value: ""
    body: |
      提示用户 确认 ${check.md}
  control_anyOne:
    definitionId: control_anyOne
    label: AnyOne
    role: normal
    input:
      - type: node
        name: prev1
        value: ""
      - type: node
        name: prev2
        value: ""
    output:
      - type: node
        name: next
        value: ""
  provide_flow:
    definitionId: provide_file
    label: Flows Skills
    role: normal
    input: []
    output:
      - type: file
        name: value
        value: ~/agentflow/reference/flow-control-capabilities.md
  provide_newFlow_key_save:
    definitionId: provide_str
    label: FlowKeyName
    role: normal
    input: []
    output:
      - type: text
        name: value
        value: newFlow
    body: ""
  provide_newFlow_key_load:
    definitionId: provide_str
    label: FlowKeyName
    role: normal
    input: []
    output:
      - type: text
        name: value
        value: newFlow
    body: ""
  collectNode:
    definitionId: tool_nodejs
    label: 收集Nodes
    description: "|"
    role: normal
    input:
      - type: node
        name: prev
        value: ""
    output:
      - type: node
        name: next
        value: ""
      - type: file
        name: result
        value: ""
    script: agentflow apply -ai collect-nodes ${workspaceRoot} ${flowName} ${result}
    body: agentflow apply -ai collect-nodes ${workspaceRoot} ${flowName} ${result}
  agent_ai_check_tool:
    definitionId: agent_subAgent
    label: AI检查
    role: normal
    input:
      - type: node
        name: prev
        value: ""
      - type: file
        name: check.md
        value: ""
      - type: text
        name: newFlow
        value: ""
    output:
      - type: node
        name: next
        value: ""
      - type: file
        name: result.md
        value: ""
    body: |
      利用 ${check.md} 检查流水线(${newFlow})是否正常，将检查报告写入${result.md}
  AI_CHECK_FILE:
    definitionId: provide_file
    label: AICheckFile
    role: normal
    input: []
    output:
      - type: file
        name: value
        value: ~/agentflow/reference/flow-prompt-handler-check.md
  save_flow_name:
    definitionId: tool_save_key
    label: SaveFlowName
    description: "由 agentflow apply 流程内部执行。命令：agentflow apply -ai run-tool-nodejs <workspaceRoot> <flowName> <uuid> <instanceId> <execId> -- node <path>/save-key.mjs <workspaceRoot> <flowName> <uuid> <key> <value>。返回（stdout 一行 JSON）：{ \\\"err_code\\\": 0, \\\"message\\\": { \\\"result\\\": \\\"<写入的 value>\\\" } }（err_code 0=成功 1=失败）。"
    role: normal
    input:
      - type: node
        name: prev
        value: ""
      - type: text
        name: key
        value: newFlow
      - type: text
        name: value
        value: ""
    output: []
  loadFlowKey:
    definitionId: tool_load_key
    label: LoadFlowName
    description: "由 agentflow apply 流程内部执行。命令：agentflow apply -ai run-tool-nodejs <workspaceRoot> <flowName> <uuid> <instanceId> <execId> -- node <path>/load-key.mjs <workspaceRoot> <flowName> <uuid> <key>。返回（stdout 一行 JSON）：{ \\\"err_code\\\": 0, \\\"message\\\": { \\\"result\\\": \\\"<value>\\\" } }（err_code 0=成功 1=失败）；result 写入节点的 result 槽位。"
    role: normal
    input:
      - type: text
        name: key
        value: newFlow
    output:
      - type: text
        name: result
        value: ""
  tool_check_flow:
    definitionId: tool_nodejs
    label: Flow脚本检查
    description: "|"
    role: normal
    input:
      - type: node
        name: prev
        value: ""
      - type: text
        name: newFlow
        value: ""
    output:
      - type: node
        name: next
        value: ""
      - type: file
        name: result
        value: ""
    body: |-
      执行：agentflow apply -ai validate-flow ${workspaceRoot} ${newFlow}。需要检查的 flow 为：${newFlow}。
      校验不通过时，由后续节点修复；本节点状态仍为 success。
  control_if_check:
    definitionId: control_if
    label: Ifcheck
    role: normal
    input:
      - type: node
        name: prev
        value: ""
      - type: bool
        name: prediction
        value: ""
    output:
      - type: node
        name: next1
        value: ""
      - type: node
        name: next2
        value: ""
    body: ""
  control_toBool_check:
    definitionId: control_toBool
    label: ToBoolCheck
    role: normal
    input:
      - type: node
        name: prev
        value: ""
      - type: file
        name: err.md
        value: ""
      - type: file
        name: err2.md
        value: ""
    output:
      - type: node
        name: next
        value: ""
      - type: bool
        name: prediction
        value: ""
    body: 检查 ${err.md} 和 ${err2.md} 都无问题为true，任一有问题则为 false
