instances:
  control_start_new:
    definitionId: control_start
    label: Start
    description: agentflow 的入口，所有流程应从这个节点开始
    role: 普通
    input: []
    output:
      - type: 节点
        name: next
        value: ''
    body: |
      流程入口
  agent_plan:
    definitionId: agent_subAgent
    label: 规划节点
    description: 基于用户需求规划节点图（nodes + edges），输出为一份 md 供用户先确认
    role: 技术规划
    input:
      - type: 节点
        name: prev
        value: ''
      - type: 文件
        name: nodes.md
        value: ''
      - type: 文件
        name: skills.md
        value: ''
      - type: 文本
        name: message
        value: ''
      - type: 文件
        name: flow.yaml
        value: ''
    output:
      - type: 节点
        name: next
        value: ''
      - type: 文件
        name: plan.md
        value: ''
      - type: 文本
        name: nowFlow
        value: ''
    body: |
      用户描述的需求为：${message}。结合现有节点信息 ${nodes.md}，及流程参考 ${flow.yaml}。规划节点图并输出为 ${plan.md}，供用户先确认。
      新建的flow名称保存到 ${nowFlow}。
      注意：内置节点的instance应保持和原始node元数据一直（尤其是 description）。
  agent_create:
    definitionId: agent_subAgent
    label: 创建Flow
    description: 用户确认完成后执行——在 .cursor/agentflow/pipelines 下创建流程文件夹、编写 flow.yaml（含 instances、edges、ui）。
    role: 普通
    input:
      - type: 节点
        name: prev
        value: ''
      - type: 文件
        name: plan.md
        value: ''
    output:
      - type: 节点
        name: next
        value: ''
      - type: 文件
        name: script.md
        value: ''
    body: |
      基于 ${plan.md} 在 .workspace/agentflow/pipelines/<流程名>/ 下**必须生成并写入** flow.yaml（不存在则创建，已存在则按规划覆盖）：
      若有脚本需实现，将脚本路径与功能说明写入 ${script.md}，供下游 agent 实现代码，本节点 **不** 书写代码。
  control_end_new:
    definitionId: control_end
    label: End
    description: AgentFlow的结束节点，执行完成后流程结束。
    role: 普通
    input:
      - type: 节点
        name: prev
        value: ''
    output: []
    body: |
      新建流程的出口。
  provide_skills_file:
    definitionId: provide_file
    label: NewSkills
    description: 直接提供文件路径或内容，不经过执行器；instance 中配置的 value（路径或内容）会写入 resolvedOutputs，供下游引用。
    role: 普通
    input: []
    output:
      - type: 文件
        name: value
        value: .cursor/skills/agentflow-flow-writing/SKILL.md
    body: ''
  provide_requirement:
    definitionId: provide_str
    label: 需求
    description: 直接提供一段文本，不经过执行器；instance 中配置的 value 会原样写入 resolvedOutputs，供下游引用。
    role: 普通
    input: []
    output:
      - type: 文本
        name: value
        value: 将AI_Workspace中个daily流程（几个source和一个summary）改造成agentflow流程
    body: ''
  agent_fix:
    definitionId: agent_subAgent
    label: 修复节点
    description: 利用SubAgent执行任务
    role: 技术规划
    input:
      - type: 节点
        name: prev
        value: ''
      - type: 文件
        name: err.md
        value: ''
      - type: 文件
        name: err2.md
        value: ''
    output:
      - type: 节点
        name: next
        value: ''
    body: |
      修复${err.md} 及 ${err2.md} 中提到的问题
  agent_implement_script:
    definitionId: agent_subAgent
    label: 完善代码
    description: 利用SubAgent执行任务
    role: 代码执行
    input:
      - type: 节点
        name: prev
        value: ''
      - type: 文件
        name: code.md
        value: ''
    output:
      - type: 节点
        name: next
        value: ''
    body: |
      实现 ${code.md} 中提到要写的代码。
  tool_user_check:
    definitionId: tool_user_check
    label: UserCheck
    description: 等待用户确认，流程暂停，status为 pending。需用户回复 \"继续\" 才重启流程.
    role: 普通
    input:
      - type: 节点
        name: pre
        value: ''
      - type: 文件
        name: check.md
        value: ''
    output:
      - type: 节点
        name: next
        value: ''
    body: |
      提示用户 确认 ${check.md}
  control_anyOne:
    definitionId: control_anyOne
    label: AnyOne
    description: 当任一上游输入就绪（success）时，沿 next 继续执行。
    role: 普通
    input:
      - type: 节点
        name: prev1
        value: ''
      - type: 节点
        name: prev2
        value: ''
    output:
      - type: 节点
        name: next
        value: ''
  provide_flow:
    definitionId: provide_file
    label: FlowsSkills
    description: 直接提供文件路径或内容，不经过执行器；instance 中配置的 value（路径或内容）会写入 resolvedOutputs，供下游引用。
    role: 普通
    input: []
    output:
      - type: 文件
        name: value
        value: .workspace/agentflow/reference/flow-control-capabilities.md
  collectNode:
    definitionId: tool_nodejs
    label: 收集Nodes
    description: 使用 agentflow apply -ai run-tool-nodejs 执行脚本。约定格式为 {\"err_code\":0,\"message\":{\"result\":\"...\"}}；err_code 为节点执行结果（0=成功、1=失败），后处理据此写 result.status。message 仅含 result（文本），无 next。执行器校验 stdout 并提取 message.result 写入 ${result}。
    role: 普通
    input:
      - type: 节点
        name: prev
        value: ''
    output:
      - type: 节点
        name: next
        value: ''
      - type: 文件
        name: result
        value: ''
    body: agentflow apply -ai collect-nodes ${workspaceRoot} ${flowName} ${runDir}
  agent_ai_check_tool:
    definitionId: agent_subAgent
    label: AI检查
    description: 利用SubAgent执行任务
    role: 普通
    input:
      - type: 节点
        name: prev
        value: ''
      - type: 文件
        name: check.md
        value: ''
      - type: 文本
        name: nowFlow
        value: ''
    output:
      - type: 节点
        name: next
        value: ''
      - type: 文件
        name: result.md
        value: ''
    body: |
      利用 ${check.md} 检查流水线(${nowFlow})是否正常，将检查报告写入${result.md}
  AI_CHECK_FILE:
    definitionId: provide_file
    label: AICheckFile
    description: 直接提供文件路径或内容，不经过执行器；instance 中配置的 value（路径或内容）会写入 resolvedOutputs，供下游引用。
    role: 普通
    input: []
    output:
      - type: 文件
        name: value
        value: .workspace/agentflow/reference/flow-prompt-handler-check.md
  save_flow_name:
    definitionId: tool_save_key
    label: SaveFlowName
    description: "由 agentflow apply 流程内部执行。命令：agentflow apply -ai run-tool-nodejs <workspaceRoot> <flowName> <uuid> <instanceId> <execId> -- node <path>/save-key.mjs <workspaceRoot> <flowName> <uuid> <key> <value>。返回（stdout 一行 JSON）：{ \"err_code\": 0, \"message\": { \"result\": \"<写入的 value>\" } }（err_code 0=成功 1=失败）。"
    role: 普通
    input:
      - type: 节点
        name: prev
        value: ''
      - type: 文本
        name: key
        value: nowFlow
      - type: 文本
        name: value
        value: ''
    output: []
  loadFlowKey:
    definitionId: tool_load_key
    label: LoadFlowName
    description: "由 agentflow apply 流程内部执行。命令：agentflow apply -ai run-tool-nodejs <workspaceRoot> <flowName> <uuid> <instanceId> <execId> -- node <path>/load-key.mjs <workspaceRoot> <flowName> <uuid> <key>。返回（stdout 一行 JSON）：{ \"err_code\": 0, \"message\": { \"result\": \"<value>\" } }（err_code 0=成功 1=失败）；result 写入节点的 result 槽位。"
    role: 普通
    input:
      - type: 文本
        name: key
        value: nowFlow
    output:
      - type: 文本
        name: result
        value: ''
  tool_check_flow:
    definitionId: tool_nodejs
    label: Flow脚本检查
    description: 使用 agentflow apply -ai run-tool-nodejs 执行脚本。约定格式为 {\"err_code\":0,\"message\":{\"result\":\"...\"}}；err_code 为节点执行结果（0=成功、1=失败），后处理据此写 result.status。message 仅含 result（文本），无 next。执行器校验 stdout 并提取 message.result 写入 ${result}。
    role: 普通
    input:
      - type: 节点
        name: prev
        value: ''
      - type: 文本
        name: nowFlow
        value: ''
    output:
      - type: 节点
        name: next
        value: ''
      - type: 文件
        name: result
        value: ''
    body: |-
      执行：agentflow apply -ai check-flow ${workspaceRoot} ${nowFlow}。需要检查的 flow 为：${nowFlow}
  control_if_check:
    definitionId: control_if
    label: Ifcheck
    description: 约定有且仅有一个 type 为 bool 的 input（名称不限，如 prediction）。该值为 true 时沿 next1 继续，为 false 时沿 next2 继续
    role: 普通
    input:
      - type: 节点
        name: prev
        value: ''
      - type: bool
        name: prediction
        value: ''
    output:
      - type: 节点
        name: next1
        value: ''
      - type: 节点
        name: next2
        value: ''
    body: ''
  control_toBool_check:
    definitionId: control_toBool
    label: ToBoolCheck
    description: 获取 instance 中 AgentSubAgent 运行的结果，得到布尔结论后写入 ${prediction}。prediction 槽位类型为 bool，写入 output 文件时，文件内容必须仅为 "true" 或 "false"，不得写入说明、统计、结论等整段 markdown。
    role: 普通
    input:
      - type: 节点
        name: prev
        value: ''
      - type: 文件
        name: err.md
        value: ''
      - type: 文件
        name: err2.md
        value: ''
    output:
      - type: 节点
        name: next
        value: ''
      - type: bool
        name: prediction
        value: ''
    body: 检查 ${err.md} 和 ${err2.md} 都无问题为true，任一有问题则为 false
